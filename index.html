    <style>

            margin:0;

            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
        }

        .hero{
            height:100vh;
            display:flex;

        h1{

        }

        h2{

        a{

            color:white;
            text-decoration:none;

            transition:.3s;
        }

        a:hover{
            transform:scale(1.05);
        }
